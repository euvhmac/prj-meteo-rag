# MeteoRAG — Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meteorag
  namespace: meteorag
  labels:
    app: meteorag
    component: web
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: meteorag
  template:
    metadata:
      labels:
        app: meteorag
        component: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8502"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: meteorag
          image: ghcr.io/victorliquiddata/meteorag:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8501
              protocol: TCP
            - name: metrics
              containerPort: 8502
              protocol: TCP
          envFrom:
            - configMapRef:
                name: meteorag-config
            - secretRef:
                name: meteorag-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
