name: CD — Build + Push + Deploy

on:
  push:
    branches: [main]
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image summary
        run: |
          echo "### 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via Helm
        run: |
          echo "🚀 Deploy step — configurar com credenciais do cluster K8s"
          echo ""
          echo "Para ativar o deploy automatizado, descomente o bloco abaixo"
          echo "e configure os secrets KUBE_CONFIG no repositório."
          echo ""
          # ── Descomentar quando cluster K8s estiver configurado ──
          # echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
          # export KUBECONFIG=kubeconfig.yaml
          #
          # helm upgrade --install meteorag helm/meteorag/ \
          #   -f helm/meteorag/values.prod.yaml \
          #   --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          #   --set image.tag=${{ needs.build-and-push.outputs.image-tag }} \
          #   --set secrets.anthropicApiKey=${{ secrets.METEORAG_ANTHROPIC_API_KEY }} \
          #   -n meteorag \
          #   --create-namespace \
          #   --wait --timeout=300s
          #
          # rm -f kubeconfig.yaml

      - name: Post-deploy health check
        run: |
          echo "⏭️ Health check será executado quando deploy estiver ativo."
          # python scripts/health_check.py --url https://meteorag.example.com/_stcore/health
