# MeteoRAG — Docker Compose (Desenvolvimento Local)
version: "3.9"

services:
  meteorag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meteorag-dev
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./src:/app/src  # hot reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
